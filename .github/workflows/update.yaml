name: update

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

defaults:
  run:
    shell: nu {0}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: hustcer/setup-nu@v3
      - uses: astral-sh/setup-uv@v8.1.0

      - run: uv run pre_gommit_hooks.py
        id: update

      - name: Run oxfmt
        run: npx oxfmt

      - name: Get calver
        run: |
          let today = date now | format date "v%Y.%m.%d"
          print $today
          $"TODAY=($today)\n" | save --append $env.GITHUB_OUTPUT
        id: date

      - name: Update README
        if: steps.update.outputs.UPDATED == 'true'
        run: |
          let today = '${{ steps.date.outputs.TODAY }}'
          open README.md --raw | collect | decode utf-8 | str replace --regex v\d+\.\d+\.\d+ $today | save -f README.md

      - if: steps.update.outputs.UPDATED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Automatically update pre-commit hooks: ${{ steps.date.outputs.TODAY }}"
          tagging_message: ${{ steps.date.outputs.TODAY }}
